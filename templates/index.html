<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站视频ASR文本提取工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #videoUrl {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        #videoUrl:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
        }

        .result.show {
            display: block;
        }

        .video-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .video-info h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .info-item {
            margin-bottom: 10px;
            color: #555;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
            display: inline-block;
            min-width: 80px;
        }

        .subtitle-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .subtitle-box h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #subtitleText {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .copy-btn {
            padding: 8px 16px;
            font-size: 14px;
            background: #28a745;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }

        .example {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #0066cc;
        }

        .example strong {
            display: block;
            margin-bottom: 8px;
        }

        .example code {
            background: white;
            padding: 5px 10px;
            border-radius: 4px;
            display: block;
            margin-top: 5px;
            color: #333;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>B站视频ASR文本提取工具</h1>
        <p class="subtitle">快速提取B站视频的字幕和ASR文本</p>

        <div class="input-group">
            <input
                type="text"
                id="videoUrl"
                placeholder="粘贴B站视频链接，例如：https://www.bilibili.com/video/BV1XkAne1Ew1/"
                autofocus
            >
            <button id="extractBtn" onclick="extractASR()">提取文本</button>
        </div>

        <div class="example">
            <strong>支持的链接格式：</strong>
            <code>https://www.bilibili.com/video/BV1XkAne1Ew1/</code>
            <code>BV1XkAne1Ew1</code>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在提取字幕，请稍候...</p>
        </div>

        <div class="result" id="result">
            <div class="video-info">
                <h3>视频信息</h3>
                <div class="info-item">
                    <span class="info-label">标题：</span>
                    <span id="videoTitle"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">UP主：</span>
                    <span id="videoAuthor"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">BV号：</span>
                    <span id="videoBvid"></span>
                </div>
            </div>

            <div class="subtitle-box">
                <h3>
                    <span>字幕文本 <span id="subtitleLang"></span></span>
                    <button class="copy-btn" onclick="copyText()">复制文本</button>
                </h3>
                <div id="subtitleText"></div>
            </div>
        </div>

        <div class="error" id="error" style="display: none;"></div>
    </div>

    <script>
        // 回车键提交
        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                extractASR();
            }
        });

        async function extractASR() {
            const url = document.getElementById('videoUrl').value.trim();
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const extractBtn = document.getElementById('extractBtn');

            if (!url) {
                showError('请输入B站视频链接');
                return;
            }

            // 重置显示
            loading.classList.add('show');
            result.classList.remove('show');
            error.style.display = 'none';
            extractBtn.disabled = true;

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                loading.classList.remove('show');
                extractBtn.disabled = false;

                if (data.success) {
                    // 显示视频信息
                    document.getElementById('videoTitle').textContent = data.video_info.title;
                    document.getElementById('videoAuthor').textContent = data.video_info.author;
                    document.getElementById('videoBvid').textContent = data.bvid;
                    document.getElementById('subtitleLang').textContent = `(${data.subtitle.lang})`;
                    document.getElementById('subtitleText').textContent = data.subtitle.text;

                    result.classList.add('show');
                } else {
                    showError(data.error || '提取失败');
                }
            } catch (err) {
                loading.classList.remove('show');
                extractBtn.disabled = false;
                showError('网络错误或服务器未响应');
            }
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }

        function copyText() {
            const text = document.getElementById('subtitleText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '已复制！';
                btn.style.background = '#20c997';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                }, 2000);
            }).catch(err => {
                alert('复制失败，请手动复制');
            });
        }
    </script>
</body>
</html>
